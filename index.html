<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Link do Amor ❤️</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(#ffdde1, #ee9ca7);
      padding: 50px;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      max-width: 500px;
      margin: auto;
    }
    button {
      background: #ff4d6d;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Uma surpresa pra você ❤️</h1>
    <p id="msg">Clique no botão abaixo...</p>
    <button onclick="mostrar()">Clique aqui</button>
  </div>

  <script>
    function mostrar() {
      document.getElementById("msg").innerText =
        "Eu te amo mais do que tudo nessa vida ❤️";
    }
  </script>
</body>
</html>
